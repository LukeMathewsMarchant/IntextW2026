name: Build and deploy ml-service to Azure Web App - ml-pipelines

on:
  push:
    branches:
      - main
    paths:
      - 'ml-service/**'
      - '.github/workflows/main_ml-pipelines.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate dependencies
        run: |
          cd ml-service
          pip install -r requirements.txt

      - name: Verify admin analytics routes exist in source
        run: |
          grep -q "/reports/tier1-analytics" ml-service/app/main.py
          grep -q "/donations/analytics" ml-service/app/main.py

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
      contents: read

    steps:
      # Deploy from a fresh checkout so wwwroot always matches repo layout:
      # wwwroot/app/main.py, wwwroot/requirements.txt (no nested artifact folders).
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1A081AB05F7D42DC9E899C57AF0342F8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_62C4D7E7BFD44A458744D56F1280193A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1C33F54D43F04846A58ABC1D9395F5FC }}

      # Omit slot-name so this updates the app your default hostname serves. A wrong slot
      # (e.g. "Production" vs default) can make the workflow "succeed" while the public URL
      # still runs an old build — OpenAPI title/version will stay stuck on the old API.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ml-pipelines'
          package: ./ml-service

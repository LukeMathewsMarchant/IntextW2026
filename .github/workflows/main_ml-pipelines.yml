name: Build and deploy ml-service to Azure Web App - ml-pipelines

on:
  push:
    branches:
      - main
    paths:
      - 'ml-service/**'
      - '.github/workflows/main_ml-pipelines.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate dependencies
        run: |
          cd ml-service
          pip install -r requirements.txt

      - name: Verify admin analytics routes exist in source
        run: |
          grep -q "/reports/tier1-analytics" ml-service/app/main.py
          grep -q "/donations/analytics" ml-service/app/main.py

      - name: Verify startup script does not build venv at runtime
        run: |
          # Ensure we never regress to runtime venv creation (breaks on App Service images without ensurepip).
          ! grep -q "python3 -m venv" ml-service/startup.sh
          grep -q "Using gunicorn from antenv" ml-service/startup.sh

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
      contents: read

    steps:
      # Deploy from a fresh checkout so wwwroot always matches repo layout:
      # wwwroot/app/main.py, wwwroot/requirements.txt (no nested artifact folders).
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1A081AB05F7D42DC9E899C57AF0342F8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_62C4D7E7BFD44A458744D56F1280193A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1C33F54D43F04846A58ABC1D9395F5FC }}

      - name: Stamp build id in App Settings
        shell: bash
        run: |
          set -euo pipefail
          az webapp config appsettings set \
            --name ml-pipelines \
            --resource-group ml-pipelines_group \
            --settings ML_API_BUILD_ID="${GITHUB_SHA}" >/dev/null

      # Omit slot-name so this updates the app your default hostname serves. A wrong slot
      # (e.g. "Production" vs default) can make the workflow "succeed" while the public URL
      # still runs an old build — OpenAPI title/version will stay stuck on the old API.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ml-pipelines'
          package: ./ml-service

      - name: Smoke test deployed API shape
        shell: bash
        run: |
          set -euo pipefail
          HOSTNAME="$(az webapp show --name ml-pipelines --resource-group ml-pipelines_group --query defaultHostName -o tsv)"
          BASE_URL="https://${HOSTNAME}"
          export BASE_URL
          export EXPECTED_BUILD_ID="${GITHUB_SHA}"
          echo "Testing ${BASE_URL}"
          # App Service + Oryx warm-up can take a few minutes.
          sleep 30
          python - <<'PY'
          import json
          import time
          import urllib.request

          import os
          base = os.environ["BASE_URL"]

          def fetch_json(path: str):
              with urllib.request.urlopen(base + path, timeout=30) as r:
                  return json.loads(r.read().decode("utf-8"))

          last_error = None
          for _ in range(20):
              try:
                  health = fetch_json("/health")
                  openapi = fetch_json("/openapi.json")
                  paths = openapi.get("paths", {})
                  assert "/donations/analytics" in paths, "Missing /donations/analytics in OpenAPI"
                  assert "/reports/tier1-analytics" in paths, "Missing /reports/tier1-analytics in OpenAPI"
                  assert health.get("status") == "ok", "Health status is not ok"
                  build_id = (health.get("buildId") or "").lower()
                  expected = (os.environ.get("EXPECTED_BUILD_ID") or "").lower()
                  assert expected and build_id == expected, "Build id does not match deployed commit SHA"
                  print("Smoke test passed.")
                  raise SystemExit(0)
              except Exception as ex:  # noqa: BLE001
                  last_error = ex
                  time.sleep(15)
          raise SystemExit(f"Smoke test failed after retries: {last_error}")
          PY
